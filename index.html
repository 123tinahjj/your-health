<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>نظام تتبع الصحة الذكي | Smart Health Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #121218;
            --bg-card: rgba(18, 18, 24, 0.98);
            --border-color: #2a2a35;
            --accent-primary: #ff4b5f;
            --accent-secondary: #ff8c42;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a8;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
            --info: #2196f3;
        }

        body.light-mode {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.98);
            --border-color: #e0e0e5;
            --text-primary: #1a1a1f;
            --text-secondary: #5a5a6a;
        }

        body {
            background: var(--bg-primary);
            font-family: 'Segoe UI', 'Cairo', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        @media (min-width: 1024px) {
            .dashboard-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }
            .full-width {
                grid-column: span 2;
            }
            body {
                padding: 30px;
            }
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .login-screen {
            background: var(--bg-card);
            border-radius: 48px;
            padding: 32px;
            border: 1px solid var(--accent-primary);
            max-width: 500px;
            margin: 0 auto;
        }

        .login-screen h2 {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 26px;
            margin-bottom: 12px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--accent-secondary);
            font-weight: bold;
        }

        .login-input, .form-select {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 60px;
            color: var(--text-primary);
            font-size: 15px;
            transition: 0.2s;
        }

        .login-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .login-btn {
            background: linear-gradient(95deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .btn-danger {
            background: linear-gradient(95deg, #dc3545, #c82333);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            background: var(--bg-secondary);
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid var(--border-color);
            font-weight: bold;
        }

        .tab.active {
            background: linear-gradient(95deg, var(--accent-primary), var(--accent-secondary));
            border-color: transparent;
            color: white;
        }

        .battery-container {
            background: var(--border-color);
            height: 30px;
            border-radius: 40px;
            overflow: hidden;
            margin: 15px 0;
        }

        .bat-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            transition: width 0.5s;
            border-radius: 40px;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-action {
            background: linear-gradient(95deg, var(--accent-primary), var(--accent-secondary));
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 16px;
            color: white;
            margin: 12px 0;
            cursor: pointer;
        }

        .rest-alert {
            background: rgba(255, 75, 95, 0.15);
            border: 1px solid var(--accent-primary);
            border-radius: 28px;
            padding: 16px;
            margin: 12px 0;
            text-align: center;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 24px;
            text-align: center;
        }

        .history-log {
            max-height: 200px;
            overflow-y: auto;
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 16px;
            margin-top: 16px;
        }

        .activity-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin: 16px 0;
            max-height: 280px;
            overflow-y: auto;
            padding: 4px;
        }

        .activity-option {
            background: var(--bg-secondary);
            padding: 12px;
            text-align: center;
            border-radius: 28px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            font-size: 14px;
        }

        .activity-option.selected {
            border-color: var(--accent-primary);
            background: rgba(255, 75, 95, 0.1);
        }

        .intensity-btns {
            display: flex;
            gap: 12px;
            margin: 12px 0;
        }

        .intensity-btn {
            flex: 1;
            background: var(--bg-secondary);
            padding: 12px;
            text-align: center;
            border-radius: 40px;
            cursor: pointer;
        }

        .intensity-btn.selected {
            background: var(--accent-primary);
            color: white;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 32px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px;
        }

        .lang-switch {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .lang-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
        }

        .lang-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .chart-box {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 16px;
        }

        canvas {
            max-height: 220px;
            width: 100%;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            .tab {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-container" id="root"></div>

<script>
    // ====================== النظام المتكامل مع حفظ تلقائي ======================
    
    const STORAGE_KEY = 'health_tracker_pro_final_v2';
    const ADMIN_PASSWORD = '1234';
    
    let currentUser = null;
    let activeTab = 'activities';
    let currentLang = 'ar';
    let isLightMode = false;
    let charts = { pie: null, bar: null, line: null };
    
    // ملف الترجمة
    const translations = {
        ar: {
            appTitle: 'نظام تتبع الصحة الذكي',

            intensity: 'الشدة',
            light: 'هادئ',
            medium: 'متوسط',
            intense: 'شديد',
            cancel: 'إلغاء',
            submit: 'تسجيل',

            deleteConfirm: '⚠️ سيتم حذف جميع بياناتك نهائياً. أدخل كلمة السر 1234 للتأكيد',
            wrongPassword: 'كلمة السر غير صحيحة',
            logoutConfirm: 'أدخل كلمة السر 1234 لتسجيل الخروج',
            dailySummary: 'ملخص نهاية اليوم'
        },
        en: {
            appTitle: 'Smart Health Tracker',
            login: 'Login',
            email: 'Email',
            fullName: 'Full Name',
            gender: 'Gender',
            male: 'Male',
            female: 'Female',
            age: 'Age',
            weight: 'Weight (kg)',
            height: 'Height (cm)',
            healthStatus: 'Health Status',
            startJourney: '🚀 Start Journey',
            deleteAllData: '🗑️ Delete All Data',
            passwordRequired: 'Password required (1234)',
            energy: 'Energy',
            activities: 'Activities',
            dailyReport: 'Daily Report',
            monthlyReport: 'Monthly Report',
            newActivity: 'New Activity',
            sleepTime: 'Sleep Time',
            wakeTime: 'Wake Time',
            meals: 'Meals',
            previousActivity: 'Previous Activities',
            activityType: 'Activity Type',
            duration: 'Duration (min)',
            intensity: 'Intensity',
            light: 'Light',
            medium: 'Medium',
            intense: 'Intense',
            cancel: 'Cancel',
            submit: 'Submit',
            logout: 'Logout',
            theme: 'Theme',
            restRequired: 'Rest Required',
            calories: 'Calories',
            totalStats: 'Statistics',
            noData: 'No Data',
            deleteConfirm: '⚠️ All data will be permanently deleted. Enter password 1234 to confirm',
            wrongPassword: 'Wrong password',
            logoutConfirm: 'Enter password 1234 to logout',
            dailySummary: 'End of Day Summary'
        }
    };
    
    function t(key) {
        return translations[currentLang][key] || key;
    }
    
    // قائمة النشاطات الجنسية والمتنوعة حسب الطلب
    const ACTIVITY_LIST_AR = [
        'مشي بطيء', 'مشي سريع', 'جري (8كم/س)', 'جري سريع', 'تمارين خفيفة', 'تمارين مكثفة',
        'تضاجع (ذكر يضاجع ذكر)', 'تضاجع (ذكر يضاجع أنثى)', 'تضاجع (أنثى تضاجع أنثى)',
        'استمناء (ذكر)', 'استمناء (أنثى)', 'مداعبة حميمة'
    ];
    
    const ACTIVITY_LIST_EN = [
        'Slow Walk', 'Fast Walk', 'Jogging', 'Running', 'Light Exercise', 'Intense Exercise',
        'Sex (Male with Male)', 'Sex (Male with Female)', 'Sex (Female with Female)',
        'Masturbation (Male)', 'Masturbation (Female)', 'Intimate Caress'
    ];
    
    // معاملات METs محدثة لتشمل جميع الأنشطة
    const MET_VALUES = {
        'مشي بطيء': 3.0, 'Slow Walk': 3.0,
        'مشي سريع': 4.5, 'Fast Walk': 4.5,
        'جري (8كم/س)': 8.0, 'Jogging': 8.0,
        'جري سريع': 12.0, 'Running': 12.0,
        'تمارين خفيفة': 4.0, 'Light Exercise': 4.0,
        'تمارين مكثفة': 7.0, 'Intense Exercise': 7.0,
        'تضاجع (ذكر يضاجع ذكر)': 3.8, 'Sex (Male with Male)': 3.8,
        'تضاجع (ذكر يضاجع أنثى)': 3.5, 'Sex (Male with Female)': 3.5,
        'تضاجع (أنثى تضاجع أنثى)': 3.2, 'Sex (Female with Female)': 3.2,
        'استمناء (ذكر)': 2.5, 'Masturbation (Male)': 2.5,
        'استمناء (أنثى)': 2.2, 'Masturbation (Female)': 2.2,
        'مداعبة حميمة': 2.0, 'Intimate Caress': 2.0
    };
    
    const PREVIOUS_ACTIVITY_IMPACT = {
        'لا شيء': 0, 'None': 0,
        'عمل شاق': 15, 'Hard Work': 15,
        'تمرين مكثف': 20, 'Intense Exercise': 20,
        'إجهاد عام': 10, 'Stress': 10,
        'قلة نوم': 12, 'Lack of Sleep': 12
    };
    
    function calculateBMR(weight, height, age, gender) {
        if (gender === 'ذكر' || gender === 'Male') {
            return 88.362 + (13.397 * weight) + (4.799 * height) - (5.677 * age);
        } else {
            return 447.593 + (9.247 * weight) + (3.098 * height) - (4.330 * age);
        }
    }
    
    function calculateCalories(met, weight, duration) {
        return met * weight * (duration / 60);
    }
    
    function calculateEnergyDrain(calories, bmr) {
        const hourlyBMR = bmr / 24;
        return Math.min(85, Math.max(5, Math.round((calories / hourlyBMR) * 100)));
    }
    
    function calculateWakeDrain(wakeHours) {
        return Math.min(70, wakeHours * 4.5);
    }
    
    function calculateRest(energyDrain, duration) {
        return Math.min(16, Math.max(1, Math.round(((energyDrain / 12) + (duration / 60)) * 10) / 10));
    }
    
    function getTodayKey() { return new Date().toISOString().slice(0, 10); }
    function getCurrentMonthKey() { return new Date().toISOString().slice(0, 7); }
    
    function createNewUser(userData) {
        const today = getTodayKey();
        const month = getCurrentMonthKey();
        const bmr = calculateBMR(userData.weight, userData.height || 170, userData.age, userData.gender);
        
        return {
            email: userData.email,
            fullName: userData.fullName,
            gender: userData.gender,
            age: parseInt(userData.age),
            weight: parseFloat(userData.weight),
            height: parseFloat(userData.height || 170),
            bmr: bmr,
            healthConditions: userData.healthConditions || '',
            createdAt: Date.now(),
            currentEnergy: 100,
            lastActivityTime: 0,
            dailyLogs: { [today]: { sleepTime: '', wakeTime: '', wakeHours: 0, meals: [], previousActivities: '', activities: [], daySummary: null } },
            monthlyLogs: { [month]: { activities: [], totalCalories: 0, totalActivities: 0 } },
            totalStats: { activitiesCount: 0, totalCalories: 0, byType: {} },
            lastDateReset: today,
            lastMonthReset: month
        };
    }
    
    function loadAllUsers() {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
    }
    
    function saveAllUsers(db) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }
    
    function checkAndResetDay(user) {
        const today = getTodayKey();
        const month = getCurrentMonthKey();
        let changed = false;
        
        if (user.lastDateReset !== today) {
            const yesterday = user.lastDateReset;
            if (yesterday && user.dailyLogs[yesterday] && user.dailyLogs[yesterday].activities.length > 0) {
                const activities = user.dailyLogs[yesterday].activities;
                const totalCalories = activities.reduce((s, a) => s + a.calories, 0);
                const totalEnergyDrain = activities.reduce((s, a) => s + a.energyDrain, 0);
                user.dailyLogs[yesterday].daySummary = {
                    date: yesterday,
                    totalCalories: totalCalories,
                    totalEnergyDrain: totalEnergyDrain,
                    activitiesCount: activities.length,
                    finalEnergy: activities[activities.length - 1]?.energyAfter || 100
                };
            }
            user.currentEnergy = 100;
            user.lastDateReset = today;
            if (!user.dailyLogs[today]) {
                user.dailyLogs[today] = { sleepTime: '', wakeTime: '', wakeHours: 0, meals: [], previousActivities: '', activities: [], daySummary: null };
            }
            changed = true;
        }
        
        if (user.lastMonthReset !== month) {
            if (!user.monthlyLogs[month]) {
                user.monthlyLogs[month] = { activities: [], totalCalories: 0, totalActivities: 0 };
            }
            user.lastMonthReset = month;
            changed = true;
        }
        
        return changed;
    }
    
    // تسجيل الدخول التلقائي: نجلب المستخدم من localStorage إذا كان موجود
    function getExistingUserByEmail(email) {
        const db = loadAllUsers();
        const normalizedEmail = email.trim().toLowerCase();
        if (db[normalizedEmail]) {
            let user = db[normalizedEmail];
            checkAndResetDay(user);
            saveAllUsers(db);
            return user;
        }
        return null;
    }
    
    function registerOrLogin(userData) {
        const db = loadAllUsers();
        const email = userData.email.trim().toLowerCase();
        
        if (!db[email]) {
            db[email] = createNewUser(userData);
        }
        
        let user = db[email];
        checkAndResetDay(user);
        db[email] = user;
        saveAllUsers(db);
        return user;
    }
    
    function persistUser(user) {
        const db = loadAllUsers();
        db[user.email] = user;
        saveAllUsers(db);
    }
    
    function recordActivity(activityData, user) {
        const today = getTodayKey();
        const month = getCurrentMonthKey();
        
        const met = MET_VALUES[activityData.type] || 4.0;
        const calories = calculateCalories(met, user.weight, activityData.duration);
        const energyDrain = calculateEnergyDrain(calories, user.bmr);
        const wakeDrain = calculateWakeDrain(activityData.wakeHours || 0);
        const prevImpact = activityData.previousActivityImpact || 0;
        
        let energyBefore = user.currentEnergy - wakeDrain - prevImpact;
        energyBefore = Math.max(10, Math.min(100, energyBefore));
        const energyAfter = Math.max(0, energyBefore - energyDrain);
        const restRequired = calculateRest(energyDrain, activityData.duration);
        
        const activityRecord = {
            id: Date.now(),
            timestamp: new Date().toISOString(),
            time: new Date().toLocaleTimeString(currentLang === 'ar' ? 'ar-EG' : 'en-US'),
            type: activityData.type,
            duration: activityData.duration,
            intensity: activityData.intensity,
            calories: Math.round(calories),
            energyDrain: energyDrain,
            energyBefore: Math.round(energyBefore),
            energyAfter: Math.round(energyAfter),
            sleepTime: activityData.sleepTime,
            wakeTime: activityData.wakeTime,
            meals: activityData.meals,
            previousActivities: activityData.previousActivities
        };
        
        user.currentEnergy = Math.round(energyAfter);
        user.lastActivityTime = Date.now();
        
        if (!user.dailyLogs[today]) {
            user.dailyLogs[today] = { sleepTime: '', wakeTime: '', wakeHours: 0, meals: [], previousActivities: '', activities: [], daySummary: null };
        }
        
        user.dailyLogs[today].activities.push(activityRecord);
        if (activityData.sleepTime) user.dailyLogs[today].sleepTime = activityData.sleepTime;
        if (activityData.wakeTime) user.dailyLogs[today].wakeTime = activityData.wakeTime;
        if (activityData.wakeHours) user.dailyLogs[today].wakeHours = activityData.wakeHours;
        if (activityData.meals?.length) user.dailyLogs[today].meals = activityData.meals;
        
        if (!user.monthlyLogs[month]) {
            user.monthlyLogs[month] = { activities: [], totalCalories: 0, totalActivities: 0 };
        }
        user.monthlyLogs[month].activities.push(activityRecord);
        user.monthlyLogs[month].totalCalories += Math.round(calories);
        user.monthlyLogs[month].totalActivities++;
        
        user.totalStats.activitiesCount++;
        user.totalStats.totalCalories += Math.round(calories);
        user.totalStats.byType[activityData.type] = (user.totalStats.byType[activityData.type] || 0) + 1;
        
        persistUser(user);
        
        return { calories: Math.round(calories), energyDrain, energyAfter, restRequired };
    }
    
    function verifyPassword(callback) {
        const pwd = prompt(t('passwordRequired'));
        if (pwd === ADMIN_PASSWORD) callback(true);
        else { alert(t('wrongPassword')); callback(false); }
    }
    
    function logout() {
        verifyPassword((success) => {
            if (success) { currentUser = null; renderLoginScreen(); }
        });
    }
    
    function deleteAllUserData(email) {
        verifyPassword((success) => {
            if (success) {
                const db = loadAllUsers();
                delete db[email];
                saveAllUsers(db);
                alert('✅ تم حذف جميع البيانات');
                if (currentUser && currentUser.email === email) {
                    currentUser = null;
                    renderLoginScreen();
                } else {
                    renderLoginScreen();
                }
            }
        });
    }
    
    function renderCharts(user) {
        const month = getCurrentMonthKey();
        const monthlyData = user.monthlyLogs[month] || { activities: [] };
        const typeCount = {};
        monthlyData.activities.forEach(a => { typeCount[a.type] = (typeCount[a.type] || 0) + 1; });
        
        const pieCtx = document.getElementById('pieChart')?.getContext('2d');
        if (pieCtx) {
            if (charts.pie) charts.pie.destroy();
            charts.pie = new Chart(pieCtx, { type: 'pie', data: { labels: Object.keys(typeCount), datasets: [{ data: Object.values(typeCount), backgroundColor: ['#ff4b5f', '#ff8c42', '#4caf50', '#2196f3', '#9c27b0', '#00bcd4'] }] }, options: { responsive: true } });
        }
        
        const last7Days = [];
        const last7Calories = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().slice(0, 10);
            last7Days.push(dateStr.slice(5));
            const dayLog = user.dailyLogs[dateStr];
            const cals = dayLog?.activities?.reduce((s, a) => s + a.calories, 0) || 0;
            last7Calories.push(cals);
        }
        
        const barCtx = document.getElementById('barChart')?.getContext('2d');
        if (barCtx) {
            if (charts.bar) charts.bar.destroy();
            charts.bar = new Chart(barCtx, { type: 'bar', data: { labels: last7Days, datasets: [{ label: t('calories'), data: last7Calories, backgroundColor: '#ff4b5f' }] }, options: { responsive: true } });
        }
        
        const lineCtx = document.getElementById('lineChart')?.getContext('2d');
        if (lineCtx) {
            const energyData = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().slice(0, 10);
                const lastAct = user.dailyLogs[dateStr]?.activities?.slice(-1)[0];
                energyData.push(lastAct?.energyAfter || 100);
            }
            if (charts.line) charts.line.destroy();
            charts.line = new Chart(lineCtx, { type: 'line', data: { labels: last7Days, datasets: [{ label: t('energy') + ' %', data: energyData, borderColor: '#ff8c42', fill: true }] }, options: { responsive: true } });
        }
    }
    
    let selectedActivityType = '';
    let selectedIntensity = 'متوسط';
    
    function showActivityForm() {
        const activityOptions = currentLang === 'ar' ? ACTIVITY_LIST_AR : ACTIVITY_LIST_EN;
        if (!selectedActivityType || !activityOptions.includes(selectedActivityType)) selectedActivityType = activityOptions[0];
        
        const modalHtml = `
            <div id="activityModal" class="modal">
                <div class="modal-content">
                    <h3 style="color: var(--accent-secondary);">➕ ${t('newActivity')}</h3>
                    <div class="form-group"><label>😴 ${t('sleepTime')}</label><input type="time" id="sleepTime" class="login-input"></div>
                    <div class="form-group"><label>🌅 ${t('wakeTime')}</label><input type="time" id="wakeTime" class="login-input"></div>
                    <div class="form-group"><label>🍽️ ${t('meals')}</label><input type="text" id="meals" class="login-input" placeholder="فطور، غداء..."></div>
                    <div class="form-group"><label>📝 ${t('previousActivity')}</label>
                        <select id="prevActivityType" class="form-select">
                            <option value="لا شيء">${currentLang === 'ar' ? 'لا شيء' : 'None'}</option>
                            <option value="عمل شاق">${currentLang === 'ar' ? 'عمل شاق' : 'Hard Work'}</option>
                            <option value="تمرين مكثف">${currentLang === 'ar' ? 'تمرين مكثف' : 'Intense Exercise'}</option>
                            <option value="إجهاد عام">${currentLang === 'ar' ? 'إجهاد عام' : 'Stress'}</option>
                            <option value="قلة نوم">${currentLang === 'ar' ? 'قلة نوم' : 'Lack of Sleep'}</option>
                        </select>
                    </div>
                    <div class="form-group"><label>🏃 ${t('activityType')}</label>
                        <div class="activity-selector">
                            ${activityOptions.map(type => `<div class="activity-option ${selectedActivityType === type ? 'selected' : ''}" onclick="selectActivityType('${type.replace(/'/g, "\\'")}')">${type}</div>`).join('')}
                        </div>
                    </div>
                    <div class="form-group"><label>⏱️ ${t('duration')}</label><input type="number" id="duration" class="login-input" min="1" max="300" value="30"></div>
                    <div class="form-group"><label>⚡ ${t('intensity')}</label>
                        <div class="intensity-btns">
                            ${[t('light'), t('medium'), t('intense')].map(int => `<div class="intensity-btn ${selectedIntensity === int ? 'selected' : ''}" onclick="selectIntensity('${int}')">${int}</div>`).join('')}
                        </div>
                    </div>
                    <div style="display:flex; gap:12px; margin-top:20px;">
                        <button onclick="closeModal()" class="login-btn btn-secondary">${t('cancel')}</button>
                        <button onclick="submitActivity()" class="login-btn">${t('submit')}</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('dynamicModal')?.remove();
        const div = document.createElement('div');
        div.id = 'dynamicModal';
        div.innerHTML = modalHtml;
        document.body.appendChild(div);
    }
    
    window.selectActivityType = (type) => { selectedActivityType = type; showActivityForm(); };
    window.selectIntensity = (int) => { selectedIntensity = int; showActivityForm(); };
    window.closeModal = () => { document.getElementById('dynamicModal')?.remove(); renderMainApp(); };
    
    window.submitActivity = () => {
        const sleepTime = document.getElementById('sleepTime')?.value || '';
        const wakeTime = document.getElementById('wakeTime')?.value || '';
        const meals = document.getElementById('meals')?.value || '';
        const prevActivityType = document.getElementById('prevActivityType')?.value || 'لا شيء';
        const duration = parseInt(document.getElementById('duration')?.value || '30');
        
        let wakeHours = 0;
        if (sleepTime && wakeTime) {
            const sleepDate = new Date(`2000/01/01 ${sleepTime}`);
            const wakeDate = new Date(`2000/01/01 ${wakeTime}`);
            let diff = (wakeDate - sleepDate) / (1000 * 3600);
            if (diff < 0) diff += 24;
            wakeHours = Math.max(0, 24 - diff);
        }
        
        const result = recordActivity({
            type: selectedActivityType,
            duration: duration,
            intensity: selectedIntensity,
            sleepTime: sleepTime,
            wakeTime: wakeTime,
            wakeHours: wakeHours,
            meals: meals ? [meals] : [],
            previousActivities: prevActivityType,
            previousActivityImpact: PREVIOUS_ACTIVITY_IMPACT[prevActivityType] || 0
        }, currentUser);
        
        alert(`✅ ${t('submit')}!\n🔥 ${t('calories')}: ${result.calories}\n⚡ ${t('energy')}: -${result.energyDrain}%\n🔋 ${t('energy')}: ${result.energyAfter}%\n⏰ ${t('restRequired')}: ${result.restRequired} ${currentLang === 'ar' ? 'ساعات' : 'hours'}`);
        closeModal();
        renderMainApp();
    };
    
    function renderMainApp() {
        if (!currentUser) return;
        checkAndResetDay(currentUser);
        persistUser(currentUser);
        
        const today = getTodayKey();
        const month = getCurrentMonthKey();
        const todayLog = currentUser.dailyLogs[today] || { activities: [] };
        const monthlyData = currentUser.monthlyLogs[month] || { totalCalories: 0, totalActivities: 0 };
        const energyEval = currentUser.currentEnergy >= 60 ? 'good' : (currentUser.currentEnergy >= 30 ? 'medium' : 'low');
        
        const html = `
            <div class="card">
                <div class="flex-between">
                    <div><span style="background:rgba(255,75,95,0.2); padding:8px 16px; border-radius:30px;">👤 ${currentUser.fullName}</span></div>
                    <div class="lang-switch">
                        <button class="lang-btn ${currentLang === 'ar' ? 'active' : ''}" onclick="setLang('ar')">عربي</button>
                        <button class="lang-btn ${currentLang === 'en' ? 'active' : ''}" onclick="setLang('en')">EN</button>
                        <button class="theme-toggle lang-btn" onclick="toggleTheme()">🌓</button>
                        <button class="lang-btn" onclick="logout()">🚪 ${t('logout')}</button>
                    </div>
                </div>
                
                <div class="tabs">
                    <div class="tab ${activeTab === 'activities' ? 'active' : ''}" onclick="setTab('activities')">⚡ ${t('activities')}</div>
                    <div class="tab ${activeTab === 'dailyReport' ? 'active' : ''}" onclick="setTab('dailyReport')">📅 ${t('dailyReport')}</div>
                    <div class="tab ${activeTab === 'monthlyReport' ? 'active' : ''}" onclick="setTab('monthlyReport')">📊 ${t('monthlyReport')}</div>
                </div>
                
                <div id="tabContent"></div>
                
                <div class="charts-grid full-width">
                    <div class="chart-box"><canvas id="pieChart" height="180"></canvas></div>
                    <div class="chart-box"><canvas id="barChart" height="180"></canvas></div>
                    <div class="chart-box"><canvas id="lineChart" height="180"></canvas></div>
                </div>
            </div>
        `;
        
        document.getElementById('root').innerHTML = html;
        
        const tabContent = document.getElementById('tabContent');
        if (activeTab === 'activities') {
            tabContent.innerHTML = `
                <div class="card" style="margin-bottom:0;">
                    <div class="flex-between"><span>🔋 ${t('energy')}</span><span style="color:${energyEval === 'good' ? '#4caf50' : (energyEval === 'medium' ? '#ff9800' : '#f44336')}">${currentUser.currentEnergy}%</span></div>
                    <div class="battery-container"><div class="bat-fill" style="width: ${currentUser.currentEnergy}%;"></div></div>
                    <div class="flex-between"><span>🏆 ${t('totalStats')}</span><span>${currentUser.totalStats.activitiesCount} ${t('activities')} | ${currentUser.totalStats.totalCalories} ${t('calories')}</span></div>
                    <button class="btn-action" onclick="showActivityForm()">➕ ${t('newActivity')}</button>
                    ${currentUser.currentEnergy < 30 ? '<div class="rest-alert">⚠️ ' + (currentLang === 'ar' ? 'طاقتك منخفضة! الراحة ضرورية.' : 'Low energy! Rest required.') + '</div>' : ''}
                </div>
            `;
        } else if (activeTab === 'dailyReport') {
            const activities = [...(todayLog.activities || [])].reverse();
            const totalCals = activities.reduce((s, a) => s + a.calories, 0);
            const totalDrain = activities.reduce((s, a) => s + a.energyDrain, 0);
            tabContent.innerHTML = `
                <div class="card">
                    <h3>📅 ${t('dailyReport')} - ${today}</h3>
                    <div class="flex-between"><span>😴 ${t('sleepTime')}:</span><span>${todayLog.sleepTime || '-'}</span></div>
                    <div class="flex-between"><span>🌅 ${t('wakeTime')}:</span><span>${todayLog.wakeTime || '-'}</span></div>
                    <div class="flex-between"><span>🍽️ ${t('meals')}:</span><span>${todayLog.meals?.join(', ') || '-'}</span></div>
                    <div class="flex-between"><span>🔥 ${t('calories')}:</span><span>${totalCals}</span></div>
                    <div class="flex-between"><span>⚡ ${t('energy')}:</span><span>-${totalDrain}%</span></div>
                    <hr style="margin:12px 0;">
                    ${activities.length ? activities.map(a => `
                        <div style="background:var(--bg-primary); padding:12px; margin:8px 0; border-radius:16px;">
                            <div class="flex-between"><span>🕒 ${a.time} - <strong>${a.type}</strong> (${a.duration} min)</span></div>
                            <div>🔥 ${a.calories} cal | ⚡ -${a.energyDrain}% | 🔋 ${a.energyAfter}%</div>
                        </div>
                    `).join('') : `<div>✨ ${t('noData')}</div>`}
                </div>
            `;
        } else if (activeTab === 'monthlyReport') {
            tabContent.innerHTML = `
                <div class="card">
                    <h3>📊 ${t('monthlyReport')} - ${month}</h3>
                    <div class="flex-between"><span>🎯 ${t('activities')}:</span><span>${monthlyData.totalActivities}</span></div>
                    <div class="flex-between"><span>🔥 ${t('calories')}:</span><span>${monthlyData.totalCalories}</span></div>
                    <div class="flex-between"><span>📈 ${currentLang === 'ar' ? 'متوسط يومي' : 'Daily Average'}:</span><span>${Math.round(monthlyData.totalCalories / 30)} cal</span></div>
                    <button class="btn-action btn-secondary" onclick="deleteAllUserData('${currentUser.email}')" style="margin-top:20px;">🗑️ ${t('deleteAllData')}</button>
                </div>
            `;
        }
        
        setTimeout(() => renderCharts(currentUser), 100);
    }
    
    function renderLoginScreen() {
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="login-screen">
                <div style="font-size:48px; text-align:center;">🏃‍♂️⚡</div>
                <h2>${t('appTitle')}</h2>
                <div class="lang-switch" style="justify-content:center; margin-bottom:20px;">
                    <button class="lang-btn ${currentLang === 'ar' ? 'active' : ''}" onclick="setLang('ar')">عربي</button>
                    <button class="lang-btn ${currentLang === 'en' ? 'active' : ''}" onclick="setLang('en')">EN</button>
                    <button class="theme-toggle lang-btn" onclick="toggleTheme()">🌓</button>
                </div>
                <div class="form-group"><label>📧 ${t('email')}</label><input type="email" id="email" class="login-input" placeholder="example@mail.com"></div>
                <div class="form-group"><label>👤 ${t('fullName')}</label><input type="text" id="fullName" class="login-input"></div>
                <div class="form-group"><label>⚥ ${t('gender')}</label><select id="gender" class="form-select"><option>${t('male')}</option><option>${t('female')}</option></select></div>
                <div class="form-group"><label>🎂 ${t('age')}</label><input type="number" id="age" class="login-input"></div>
                <div class="form-group"><label>⚖️ ${t('weight')}</label><input type="number" id="weight" class="login-input" step="0.1"></div>
                <div class="form-group"><label>📏 ${t('height')}</label><input type="number" id="height" class="login-input" value="170"></div>
                <button id="registerBtn" class="login-btn">${t('startJourney')}</button>
                <button id="deleteAllBtn" class="login-btn btn-danger" style="margin-top:12px;">🗑️ ${t('deleteAllData')}</button>
            </div>
        `;
        
        document.getElementById('registerBtn').onclick = () => {
            const email = document.getElementById('email').value.trim();
            const fullName = document.getElementById('fullName').value.trim();
            const gender = document.getElementById('gender').value;
            const age = document.getElementById('age').value;
            const weight = document.getElementById('weight').value;
            const height = document.getElementById('height').value;
            if (!email || !fullName || !age || !weight) { alert('الرجاء ملء جميع الحقول المطلوبة'); return; }
            currentUser = registerOrLogin({ email, fullName, gender, age: parseInt(age), weight: parseFloat(weight), height: parseFloat(height), healthConditions: '' });
            renderMainApp();
        };
        document.getElementById('deleteAllBtn').onclick = () => {
            const email = document.getElementById('email').value.trim();
            if (email) deleteAllUserData(email);
            else alert('أدخل البريد الإلكتروني لحذف البيانات');
        };
    }
    
    window.setTab = (tab) => { activeTab = tab; renderMainApp(); };
    window.setLang = (lang) => { currentLang = lang; if (currentUser) renderMainApp(); else renderLoginScreen(); };
    window.toggleTheme = () => { isLightMode = !isLightMode; document.body.classList.toggle('light-mode', isLightMode); if (currentUser) renderMainApp(); else renderLoginScreen(); };
    window.deleteAllUserData = deleteAllUserData;
    window.logout = logout;
    
    // التحقق من وجود مستخدم محفوظ تلقائياً (آخر جلسة)
    const savedUsers = loadAllUsers();
    const lastUserEmail = localStorage.getItem('last_logged_in_email');
    if (lastUserEmail && savedUsers[lastUserEmail]) {
        currentUser = savedUsers[lastUserEmail];
        checkAndResetDay(currentUser);
        persistUser(currentUser);
        renderMainApp();
    } else {
        renderLoginScreen();
    }
    
    // حفظ آخر بريد مسجل دخول عند التسجيل
    const origRegister = registerOrLogin;
    window.registerOrLogin = function(userData) {
        const user = origRegister(userData);
        localStorage.setItem('last_logged_in_email', user.email);
        return user;
    };
    registerOrLogin = function(userData) {
        const user = origRegister(userData);
        localStorage.setItem('last_logged_in_email', user.email);
        return user;
    };
    // ربط الدالة بعد التحميل
    setTimeout(() => {
        if (window.registerOrLogin !== registerOrLogin) {
            window.registerOrLogin = registerOrLogin;
        }
    }, 0);
</script>
</body>
</html>
